# Flyntic Studio - ROS/Gazebo Physics Bridge Configuration

tcp:
  host: "0.0.0.0"
  port: 9090
  max_clients: 4

physics:
  update_rate: 50 # Hz — state updates sent to Godot
  sim_step: 0.002 # seconds — internal physics substep
  gravity: -9.81 # m/s²

drone_defaults:
  mass: 0.550 # kg (total assembled weight)
  arm_length: 0.22 # meters (motor center to CoG)
  motor_count: 4
  max_thrust_per_motor: 4.5 # Newtons
  drag_coefficient: 0.1
  angular_drag: 0.3
  inertia_xx: 0.005 # kg·m²
  inertia_yy: 0.009
  inertia_zz: 0.005

ros2:
  namespace: "/flyntic"
  topics:
    cmd_thrust: "cmd_thrust" # Float64MultiArray — motor thrusts
    pose: "odom" # Odometry — from Gazebo
    imu: "imu" # Imu — from Gazebo
    cmd_vel: "cmd_vel" # Twist — velocity commands

gazebo:
  world_file: "worlds/flyntic_world.sdf"
  model_name: "flyntic_drone"
